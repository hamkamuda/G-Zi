<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupan Makan - G-Zi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(to right,#d4ff9d,#fffabe);
color:#004d1a;
}

header{
background:#ffa94d;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
margin:0 10px;
text-decoration:none;
color:white;
font-weight:bold;
}

main{
max-width:1100px;
margin:auto;
padding:30px;
}

.section{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:30px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-row{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
flex:1;
}

button{
background:#00a63f;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:left;
}

th{
background:#eaffed;
}
</style>
</head>

<body>

<header>
<h1>🍏 G-Zi</h1>
<nav>
<a href="index.html">Beranda</a>
<a href="imt.html">Skrining</a>
<a href="kebutuhankalori.html">Kebutuhan Kalori</a>
<a href="perhitunganasupanmakan.html">Perhitungan Asupan</a>
</nav>
</header>

<main>

<h2>Perhitungan Asupan Makan</h2>

<div class="section">

<h3>Cari Bahan Makanan</h3>

<div class="form-row">
<input type="text" id="inputCari" placeholder="Nama makanan">
<input type="number" id="beratMakan" placeholder="Berat (gram)">
<input type="datetime-local" id="waktuMakan">
</div>

<button onclick="tambahMakananDatabase()">Tambahkan</button>

<ul id="hasilCari"></ul>

</div>


<div class="section">

<h3>Tambah Makanan Manual</h3>

<div class="form-row">
<input id="manualNama" placeholder="Nama makanan">
<input id="manualBerat" type="number" placeholder="Berat (gram)">
</div>

<div id="formManualGizi"></div>

<button onclick="tambahManual()">Tambah Manual</button>

</div>


<div class="section">

<h3>Daftar Makanan</h3>
<div id="tabelMakanan"></div>

</div>


<div class="section">

<h3>Total Zat Gizi</h3>

<table>
<thead>
<tr>
<th>Zat Gizi</th>
<th>Total</th>
</tr>
</thead>
<tbody id="bodyTotalGizi"></tbody>
</table>

</div>

</main>

<script src="asupanmakan.js"></script>

</body>
</html>
