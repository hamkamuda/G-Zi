<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Perhitungan Asupan Makan</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:40px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:1200px;
}

.search-container{
position:relative;
width:300px;
}

#searchMakanan{
width:100%;
padding:8px;
}

#hasilPencarian{
position:absolute;
background:white;
border:1px solid #ccc;
width:100%;
max-height:200px;
overflow-y:auto;
}

.itemMakanan{
padding:8px;
cursor:pointer;
}

.itemMakanan:hover{
background:#f2f2f2;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:13px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

button{
padding:6px;
cursor:pointer;
}

.total{
margin-top:20px;
background:#ecf0f1;
padding:15px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Perhitungan Asupan Makan</h2>

<div class="search-container">
<input type="text" id="searchMakanan" placeholder="Cari makanan...">
<div id="hasilPencarian"></div>
</div>

<input type="number" id="beratMakanan" placeholder="Berat (gram)">

<button onclick="tambahMakanan()">Tambah</button>

<table>

<thead>

<tr>
<th>Makanan</th>
<th>Berat</th>
<th>Energi</th>
<th>Protein</th>
<th>Lemak</th>
<th>Karbo</th>
<th>Serat</th>
<th>K</th>
<th>P</th>
<th>Na</th>
<th>Vit A</th>
<th>B1</th>
<th>B2</th>
<th>Vit C</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tabelMakanan"></tbody>

</table>

<div class="total">

<b>Total Zat Gizi</b><br><br>

Energi: <span id="totalEnergi">0</span><br>
Protein: <span id="totalProtein">0</span><br>
Lemak: <span id="totalLemak">0</span><br>
Karbo: <span id="totalKarbo">0</span><br>
Serat: <span id="totalSerat">0</span><br>
Kalium: <span id="totalKalium">0</span><br>
Fosfor: <span id="totalFosfor">0</span><br>
Natrium: <span id="totalNatrium">0</span><br>
Vit A: <span id="totalVitA">0</span><br>
Thiamin: <span id="totalB1">0</span><br>
Riboflavin: <span id="totalB2">0</span><br>
Vit C: <span id="totalVitC">0</span>

</div>

</div>

<script src="asupanmakan.js"></script>

</body>
</html>
